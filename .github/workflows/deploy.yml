# GitHub Actions workflow to build and deploy the app to GitHub Pages.
#
# Triggers on every push to main. Uses the official GitHub Pages actions
# to upload the Vite build output as a pages artifact and deploy it.
#
# The site will be available at: https://<username>.github.io/borough-challenge/

name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']

  # Allows manual trigger from the Actions tab
  workflow_dispatch:

# Grant GITHUB_TOKEN permission to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time (cancel in-progress ones)
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
